services:
  backend:
    build: ./backend
    container_name: simplyorder-backend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DB_PATH=/app/data/simplyorder.db
    volumes:
      - sqlite_data:/app/data
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        - REACT_APP_API_URL=http://localhost:3000/api
    container_name: simplyorder-frontend
    ports:
      - "3001:3001"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  sqlite_data:
